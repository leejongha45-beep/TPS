[/Script/Engine.RendererSettings]
; === M4 Pro Optimized Settings for Stable Frame Rate ===

; Disable Ray Tracing (Metal doesn't support hardware RT)
r.RayTracing=False
r.RayTracing.RayTracingProxies.ProjectEnabled=False

; Use Lumen with lower quality for GI
r.DynamicGlobalIlluminationMethod=1
r.Lumen.DiffuseIndirect.Allow=1
r.Lumen.Reflections.Allow=1

; Lumen Quality - Conservative settings
r.Lumen.TraceMeshSDFs.Allow=0
r.Lumen.ScreenProbeGather.RadianceCache.ProbeResolution=8
r.Lumen.ScreenProbeGather.RadianceCache.NumProbesToTraceBudget=100
r.Lumen.ScreenProbeGather.DownsampleFactor=32
r.Lumen.ScreenProbeGather.TracingOctahedronResolution=4
r.Lumen.ScreenProbeGather.ScreenTraces.HZBTraceMaxIterations=64
r.Lumen.Reflections.DownsampleFactor=2
r.Lumen.TranslucencyReflections.FrontLayer.Enable=0

; Virtual Shadow Maps - Optimized
r.Shadow.Virtual.Enable=1
r.Shadow.Virtual.ResolutionLodBiasLocal=1.0
r.Shadow.Virtual.ResolutionLodBiasDirectional=1.0
r.Shadow.Virtual.MaxPhysicalPages=1024
r.Shadow.Virtual.SMRT.RayCountDirectional=2
r.Shadow.Virtual.SMRT.RayCountLocal=2

; Substrate/Strata - Disable for performance
r.Substrate=False

; Nanite - Lower settings
r.Nanite.MaxPixelsPerEdge=2.0
r.Nanite.ViewMeshLODBias=1

; Screen Percentage / TSR
r.ScreenPercentage=75
r.TSR.ShadingRejection.Flickering=1
r.TSR.History.ScreenPercentage=100

; Anti-Aliasing
r.AntiAliasingMethod=2
r.TemporalAA.Quality=1
r.TemporalAA.Upsampling=1

; Post Processing - Reduced
r.BloomQuality=3
r.MotionBlurQuality=2
r.AmbientOcclusionLevels=1
r.SSR.Quality=1
r.DepthOfFieldQuality=1
r.LensFlareQuality=0
r.SceneColorFringeQuality=0

; Texture Quality
r.Streaming.PoolSize=1500
r.Streaming.MaxTempMemoryAllowed=128

; Distance Fields
r.DistanceFieldAO=0
r.AOGlobalDistanceField=0

; View Distance
r.ViewDistanceScale=0.8
r.SkeletalMeshLODBias=1
r.StaticMeshLODDistanceScale=1.2

; Foliage
foliage.LODDistanceScale=0.8
foliage.DensityScale=0.8
grass.DensityScale=0.7

[/Script/MacTargetPlatform.MacTargetSettings]
; Metal SM6 for Apple Silicon
-TargetedRHIs=SF_METAL_SM5
+TargetedRHIs=SF_METAL_SM6

[/Script/Engine.GarbageCollectionSettings]
; GC optimization for stable frame times
gc.TimeBetweenPurgingPendingKillObjects=30
gc.MaxObjectsNotConsideredByGC=1
gc.SizeOfPermanentObjectPool=0
gc.NumRetriesBeforeForcingGC=5

[SystemSettings]
; Memory and streaming
r.Streaming.Boost=0
r.Streaming.FullyLoadUsedTextures=0
r.Streaming.HiddenPrimitiveScale=0.5
r.Streaming.FramesForFullUpdate=5

; Physics
p.NetEnableMoveCombining=1

; Audio (if needed)
au.DisableAppVolume=1
