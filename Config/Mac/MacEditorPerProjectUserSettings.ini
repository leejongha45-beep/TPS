[/Script/UnrealEd.EditorPerProjectUserSettings]
; Editor specific settings for smoother workflow on Mac

[/Script/UnrealEd.LevelEditorViewportSettings]
; Reduce editor viewport overhead
bHighlightWithBrackets=False
bUsePowerOf2SnapSize=True
bEnableViewportHoverFeedback=False
bPreviewSelectedCameras=False
bEnableLayerSnap=False
ActorSnapScale=1.0
bSnapVertices=False

[/Script/UnrealEd.EditorExperimentalSettings]
; Disable heavy editor features
bEnableAsyncTextureCompilation=True
bEnableLiveCodeding=False

[ContentBrowser]
; Reduce content browser memory usage
NumObjectsToLoadBeforeWarning=500
NumObjectsInPathToLoadBeforeWarning=500

[/Script/EditorStyle.EditorStyleSettings]
; Disable animations for snappier UI
bEnableEditorWindowBackgroundColor=False

[SystemSettings]
; Editor-specific rendering
r.Editor.Viewport.ScreenPercentage=75
Editor.MaxObjectsInEditorList=500
